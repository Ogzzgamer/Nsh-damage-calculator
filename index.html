<!doctype html>
<html lang="zh-TW">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>逆水寒配裝模擬器 - 專業版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
 </head>
 <body>
  <header class="main-header">
   <div class="logo">
    <h2 style="margin:0">逆水寒<span class="text-accent">模擬器</span></h2>
   </div>
   <div class="quick-stats">
    <div style="font-size: 0.8em; color: #94a3b8;">預估傷害 (DPS)</div>
    <div class="dps-main">
     <span id="yield-num">0</span> <span id="yield-diff" style="font-size: 0.5em;"></span>
    </div>
   </div>
   <button id="btn-set-base">設為對比基準</button>
  </header>
  
  <div class="app-container">
   <main class="content-area">
    <section id="section-base" class="glass-section">
     <h2 class="section-title">⚔️ 基礎設定</h2>
     <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
      <div>
       <label>職業流派</label>
                        <select id="select-profession">
                            <option value="碎夢">碎夢</option>
                            <option value="神相">神相</option>
                            <option value="龍吟">龍吟</option>
                            <option value="血河">血河</option>
                            <option value="九靈">九靈</option>
                            <option value="鐵衣">鐵衣</option>
                            <option value="素問">素問</option>
                            <option value="玄機">玄機</option>
                        </select>
      </div>
      <div>
       <label>潛學流派</label> <select id="select-sub-profession"><option value="無">無</option></select>
      </div>
      <div>
       <label>首領目標</label> <select id="select-boss"></select>
      </div>
     </div>
    </section>

    <section id="section-equip" class="glass-section">
     <h2 class="section-title">🛡️ 裝備配置</h2>
     <div id="equip-container" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;"></div>
    </section>

    <section id="section-panel" class="glass-section">
     <h2 class="section-title">🔍 核心面板 (15維)</h2>
     <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
      <div>
       <h3 style="font-size: 1.1em; color: var(--accent); margin: 0 0 15px 0;">基礎面板</h3>
       <div id="panel-display" style="display: flex; flex-direction: column; gap: 10px;"></div>
      </div>
      <div>
       <h3 style="font-size: 1.1em; color: var(--accent); margin: 0 0 15px 0;">五維</h3>
       <div id="panel-display-five" style="display: flex; flex-direction: column; gap: 10px;"></div>
      </div>
     </div>
    </section>

    <section id="section-inner" class="glass-section">
     <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 class="section-title" style="margin:0">🌀 內功配置</h2>
        <button id="btn-reset-inners" style="padding: 8px 15px; font-size: 0.85em; border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1);">
            一鍵清空副詞條
        </button>
     </div>
     <div id="inner-container" style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px;"></div>
    </section>

    <section id="section-optimization" class="glass-section">
        <h2 class="section-title">🔮 智能優化路徑</h2>
        <div style="background: rgba(15, 23, 42, 0.6); padding: 20px; border-radius: 12px; border: 1px solid rgba(0, 210, 255, 0.2);">
            <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 20px;">
                <div style="flex: 1;">
                    <label>模擬分配詞條數：<span id="opt-step-display" class="text-accent">12</span></label>
                    <input type="range" id="opt-step-slider" min="1" max="42" value="12" style="width: 100%; margin-top: 10px;">
                </div>
                <button id="btn-run-opt" style="background: var(--accent); color: var(--bg-dark); font-weight: bold; border: none; padding: 15px 30px;">
                    執行優化分析
                </button>
            </div>
            <div id="optimization-results">
                <p style="text-align: center; color: #64748b; padding: 20px;">點擊上方按鈕開始模擬屬性收益...</p>
            </div>
        </div>
    </section>
   </main>

   <nav class="side-nav">
    <div style="font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">快速導航</div>
    <ul class="nav-links">
     <li><a href="#section-base">⚔️ 基礎設定</a></li>
     <li><a href="#section-equip">🛡️ 裝備配裝</a></li>
     <li><a href="#section-panel">🔍 核心面板</a></li>
     <li><a href="#section-inner">🌀 內功配置</a></li>
     <li><a href="#section-optimization">🔮 優化路徑</a></li>
    </ul>
    <div class="nav-footer" style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 15px;">
     <div style="font-size: 0.9em; font-weight: 600;">💾 配置管理</div>
     <button id="btn-save-panel" style="width:100%;">儲存方案</button>
     <div style="display:flex; gap:5px;">
      <button id="btn-export" style="flex:1">匯出</button> <button id="btn-import" style="flex:1">匯入</button>
     </div>
     <div id="saved-list" style="background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(0, 210, 255, 0.15); border-radius: 8px; padding: 15px; font-size: 1.1em; max-height: 400px; overflow-y: auto; color: #cbd5e1;"></div>
    </div>
   </nav>
  </div>
  <script type="module" src="js/main.js"></script>
 </body>
</html>
